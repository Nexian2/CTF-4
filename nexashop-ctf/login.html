<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Staff Portal &mdash; NexaShop</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>

<div class="login-wrap">
  <div style="width:100%;max-width:400px;">

    <div style="text-align:center;margin-bottom:32px;">
      <a href="/" class="logo" style="font-size:1.5rem;">Nexa<span>Shop</span></a>
    </div>

    <div class="login-card">
      <p class="login-subtitle" style="margin-bottom:0;">Staff &amp; Administration Portal</p>
      <div style="height:1px;background:var(--grey-100);margin:20px 0 24px;"></div>
      <h2 class="login-title">Sign in to your account</h2>

      <div id="alertBox"></div>

      <div class="form-group">
        <label class="form-label" for="username">Username</label>
        <input class="form-control" type="text" id="username" placeholder="Enter username" autocomplete="username">
      </div>
      <div class="form-group">
        <label class="form-label" for="password">Password</label>
        <input class="form-control" type="password" id="password" placeholder="Enter password" autocomplete="current-password"
          onkeydown="if(event.key==='Enter') doLogin()">
      </div>

      <button class="btn btn-black btn-full" style="margin-top:4px;" onclick="doLogin()" id="loginBtn">
        Sign In
      </button>

      <div class="login-footer">
        <a href="#" style="color:var(--grey-400);">Forgot password?</a>
        &nbsp;&mdash;&nbsp;
        <a href="/" style="color:var(--grey-400);">Back to store</a>
      </div>
    </div>

    <p style="text-align:center;margin-top:20px;font-size:.75rem;color:var(--grey-400);">
      This portal is for authorized staff only.<br>Unauthorized access attempts are logged and monitored.
    </p>
  </div>
</div>

<script>
  async function doLogin() {
    const username = document.getElementById('username').value.trim();
    const password = document.getElementById('password').value;
    const btn = document.getElementById('loginBtn');
    const alertBox = document.getElementById('alertBox');

    if (!username || !password) {
      alertBox.innerHTML = '<div class="alert alert-error">Please enter both username and password.</div>';
      return;
    }

    btn.disabled = true;
    btn.textContent = 'Signing in...';
    alertBox.innerHTML = '';

    try {
      const res = await fetch('/api/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, password }),
        credentials: 'include'
      });
      const data = await res.json();

      if (res.ok && data.success) {
        alertBox.innerHTML = '<div class="alert alert-success">Login successful. Redirecting...</div>';
        setTimeout(() => { window.location.href = '/admin.html'; }, 800);
      } else {
        alertBox.innerHTML = '<div class="alert alert-error">' + (data.error || 'Invalid credentials.') + '</div>';
        btn.disabled = false;
        btn.textContent = 'Sign In';
      }
    } catch (e) {
      alertBox.innerHTML = '<div class="alert alert-error">Network error. Please try again.</div>';
      btn.disabled = false;
      btn.textContent = 'Sign In';
    }
  }
</script>
</body>
</html>
